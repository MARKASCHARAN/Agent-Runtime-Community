[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-runtime-sdk"
version = "0.1.0"
description = "Python SDK for the Agent Runtime Security Platform"
authors = [
    { name = "Deepmind", email = "antigravity@google.com" }
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0"
]
requires-python = ">=3.8"

[project.optional-dependencies]
adapters = [
    "openai>=1.0.0",
    "langgraph>=0.0.10"
]
test = [
    "pytest>=7.0.0",
    "pytest-httpx>=0.21.0",
    "pytest-cov>=4.0.0"
]

[tool.hatch.build.targets.wheel]
packages = ["agent_runtime"]
